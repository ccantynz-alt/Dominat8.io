name: Auto Approve + Merge (Claude PRs)

# Runs on every PR from claude/* branches.
# Approves + squash-merges once all required checks pass.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_run:
    workflows:
      - "d8-gate"
      - "d8-keep-green"
      - "Staging smoke check"
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to approve and merge'
        required: false

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-approve-merge:
    name: Auto-approve and merge Claude PRs
    runs-on: ubuntu-latest
    # Only act on claude/* branches
    if: |
      (github.event_name == 'pull_request' &&
        startsWith(github.head_ref, 'claude/')) ||
      (github.event_name == 'workflow_run' &&
        startsWith(github.event.workflow_run.head_branch, 'claude/')) ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Find open PR for branch
        id: find_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.pr_number }}" ]; then
            PR_NUMBER="${{ github.event.inputs.pr_number }}"
          else
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            PR_NUMBER=$(gh pr list --repo ${{ github.repository }} \
              --head "$BRANCH" --state open --json number -q '.[0].number')
          fi
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "Found PR: $PR_NUMBER"

      - name: Approve PR
        if: steps.find_pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GH_CLAUDE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.find_pr.outputs.pr_number }}"
          # GITHUB_TOKEN can't approve its own PRs; GH_CLAUDE_PAT is a separate account token
          gh pr review "$PR" --repo ${{ github.repository }} \
            --approve --body "Auto-approved: all checks green on claude/* branch." || \
            echo "Approval skipped (may already be approved or same-actor restriction)"

      - name: Wait for all checks to pass
        if: steps.find_pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.find_pr.outputs.pr_number }}"
          echo "Waiting for checks on PR #$PR…"
          for i in $(seq 1 20); do
            STATE=$(gh pr view "$PR" --repo ${{ github.repository }} \
              --json mergeable,mergeStateStatus \
              -q '.mergeStateStatus')
            echo "  attempt $i: mergeStateStatus=$STATE"
            if [ "$STATE" = "CLEAN" ]; then
              echo "All checks passed."
              break
            fi
            if [ "$STATE" = "DIRTY" ]; then
              echo "PR has conflicts (state=$STATE). Skipping."
              exit 0
            fi
            sleep 15
          done

      - name: Merge PR
        if: steps.find_pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GH_CLAUDE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.find_pr.outputs.pr_number }}"
          gh pr merge "$PR" --repo ${{ github.repository }} \
            --squash --delete-branch \
            --subject "$(gh pr view $PR --repo ${{ github.repository }} --json title -q .title)" \
            && echo "✓ PR #$PR merged" \
            || echo "Merge failed — may need manual approval if branch protection requires it"
