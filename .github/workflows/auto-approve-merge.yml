name: Auto Approve + Merge (Claude PRs)

# Runs on every PR from claude/* branches.
# Approves + squash-merges once all required checks pass.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_run:
    workflows:
      - "d8-keep-green"
      - "CI"
      - "D8 Quality Gates"
    types: [completed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to approve and merge'
        required: false

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-approve-merge:
    name: Auto-approve and merge Claude PRs
    runs-on: ubuntu-latest
    # Only act on claude/* or copilot/* branches
    if: |
      (github.event_name == 'pull_request' &&
        (startsWith(github.head_ref, 'claude/') || startsWith(github.head_ref, 'copilot/'))) ||
      (github.event_name == 'workflow_run' &&
        (startsWith(github.event.workflow_run.head_branch, 'claude/') || startsWith(github.event.workflow_run.head_branch, 'copilot/'))) ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Verify GH_CLAUDE_PAT is configured
        env:
          HAS_PAT: ${{ secrets.GH_CLAUDE_PAT != '' }}
        run: |
          if [ "$HAS_PAT" != "true" ]; then
            echo "::error::GH_CLAUDE_PAT secret is not set. Auto-approve requires a PAT from a separate account (ccantyusa-hue). GITHUB_TOKEN cannot self-approve PRs."
            echo ""
            echo "To fix:"
            echo "  1. Create a Classic PAT at https://github.com/settings/tokens (logged in as ccantyusa-hue)"
            echo "  2. Scopes needed: repo, workflow, admin:repo_hook"
            echo "  3. Set it: gh secret set GH_CLAUDE_PAT --repo ccantynz-alt/Dominat8.io"
            exit 1
          fi
          echo "✓ GH_CLAUDE_PAT is configured"

      - name: Find open PR for branch
        id: find_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.pr_number }}" ]; then
            PR_NUMBER="${{ github.event.inputs.pr_number }}"
          else
            BRANCH="${{ github.event.workflow_run.head_branch }}"
            PR_NUMBER=$(gh pr list --repo ${{ github.repository }} \
              --head "$BRANCH" --state open --json number -q '.[0].number')
          fi

          if [ -z "$PR_NUMBER" ]; then
            echo "::warning::No open PR found for this branch. Skipping."
            echo "pr_number=" >> $GITHUB_OUTPUT
          else
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "Found PR: #$PR_NUMBER"
          fi

      - name: Approve PR (as ccantyusa-hue)
        if: steps.find_pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GH_CLAUDE_PAT }}
        run: |
          PR="${{ steps.find_pr.outputs.pr_number }}"
          # GH_CLAUDE_PAT is from ccantyusa-hue — a separate account so it can approve ccantynz-alt PRs
          gh pr review "$PR" --repo ${{ github.repository }} \
            --approve --body "Auto-approved: claude/* branch — all checks green." \
            && echo "✓ PR #$PR approved" \
            || echo "::warning::Approval failed (may already be approved)"

      - name: Wait for mergeStateStatus == CLEAN
        if: steps.find_pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ steps.find_pr.outputs.pr_number }}"
          echo "Waiting for all checks to pass on PR #$PR…"
          MERGED=false
          for i in $(seq 1 40); do
            STATE=$(gh pr view "$PR" --repo ${{ github.repository }} \
              --json mergeStateStatus -q '.mergeStateStatus')
            echo "  [$i/40] mergeStateStatus=$STATE"
            if [ "$STATE" = "CLEAN" ]; then
              echo "✓ All checks passed — ready to merge."
              break
            fi
            if [ "$STATE" = "DIRTY" ]; then
              echo "::error::PR has merge conflicts (DIRTY). Fix conflicts and re-push."
              exit 1
            fi
            sleep 15
          done

          # Final check
          FINAL=$(gh pr view "$PR" --repo ${{ github.repository }} \
            --json mergeStateStatus -q '.mergeStateStatus')
          if [ "$FINAL" != "CLEAN" ]; then
            echo "::error::Timed out waiting for checks. mergeStateStatus=$FINAL (expected CLEAN)"
            exit 1
          fi

      - name: Squash-merge PR
        if: steps.find_pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GH_CLAUDE_PAT }}
        run: |
          PR="${{ steps.find_pr.outputs.pr_number }}"
          TITLE=$(gh pr view "$PR" --repo ${{ github.repository }} --json title -q .title)
          gh pr merge "$PR" --repo ${{ github.repository }} \
            --squash --delete-branch \
            --subject "$TITLE (#$PR)"
          echo "✓ PR #$PR squash-merged into main"
