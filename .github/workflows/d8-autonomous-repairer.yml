name: D8 Autonomous Repairer

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: d8-autonomous-repairer
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Run doctor diagnostics
        id: doctor
        run: |
          set +e
          node scripts/doctor.mjs 2>&1 | tee doctor.log
          echo "exit=$?" >> $GITHUB_OUTPUT

      - name: Reproduce build failure (capture log)
        id: repro
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log || true
          if grep -q "Compiled successfully\|Build completed" build.log; then
            echo "passed=1" >> $GITHUB_OUTPUT
          else
            echo "passed=0" >> $GITHUB_OUTPUT
          fi

      - name: Stop if build already passes
        if: steps.repro.outputs.passed == '1'
        run: |
          echo "Build is passing; no repair needed."
          exit 0

      - name: Generate repair patch via OpenAI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "Missing OPENAI_API_KEY secret — cannot generate patch."
            exit 1
          fi

          python3 - << 'PY'
import json, os, sys, urllib.request

build_log = open("build.log", "r", encoding="utf-8", errors="ignore").read()
doctor_log = open("doctor.log", "r", encoding="utf-8", errors="ignore").read()

combined = f"=== BUILD LOG ===\n{build_log}\n\n=== DOCTOR DIAGNOSTICS ===\n{doctor_log}"
# Truncate to stay within OpenAI context limits (gpt-4o ~128k tokens; 48k chars is safe).
if len(combined) > 48000:
    combined = combined[-48000:]

prompt = f"""
You are an automated code-repair agent for a Next.js App Router repository (Dominat8).
Goal: make `npm run build` succeed.

HARD RULES:
- Do NOT introduce visible UI or design changes.
- Prefer minimal, surgical fixes (types, imports, syntax, broken routes, config).
- Output MUST be a single unified diff patch (git apply compatible), and nothing else.
- If you need to add files, include them in the patch.
- Do NOT include backticks around the patch.
- Do NOT include explanations.

DIAGNOSTICS:
{combined}
""".strip()

payload = {
  "model": "gpt-4o",
  "messages": [{"role": "user", "content": prompt}],
  "temperature": 0
}

req = urllib.request.Request(
  "https://api.openai.com/v1/chat/completions",
  data=json.dumps(payload).encode("utf-8"),
  headers={
    "Content-Type": "application/json",
    "Authorization": "Bearer " + os.environ["OPENAI_API_KEY"]
  },
  method="POST"
)

try:
  with urllib.request.urlopen(req, timeout=120) as resp:
    body = resp.read().decode("utf-8")
except urllib.error.URLError as e:
  print(f"OpenAI API request failed: {e}")
  sys.exit(3)

data = json.loads(body)
patch = data["choices"][0]["message"]["content"].strip()

if not (patch.startswith("diff --git ") or patch.startswith("--- ")):
  print("OpenAI did not return a unified diff. Raw output:\n")
  print(patch)
  sys.exit(2)

open("agent.patch", "w", encoding="utf-8").write(patch)
print("Wrote agent.patch")
PY

      - name: Apply repair patch
        run: |
          git apply --verbose agent.patch

      - name: Verify build after patch
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build_after.log

      - name: Create repair PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          ts=$(date +%Y%m%d_%H%M%S)
          BR="agent/repair_${ts}"

          git config user.name "d8-repair-agent"
          git config user.email "agent-bot@users.noreply.github.com"

          git checkout -b "$BR"
          git add -A
          git commit -m "agent: autonomous repair"
          git push origin "$BR"

          gh pr create \
            --title "agent: autonomous repair (${ts})" \
            --body "Automated repair PR generated by the D8 Autonomous Repairer workflow. No visible UI/design changes intended." \
            --base "main" \
            --head "$BR"

