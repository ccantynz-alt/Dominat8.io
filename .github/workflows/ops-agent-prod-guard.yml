name: Ops Agent — Prod Guard

# Checks production health and rolls back via Vercel alias if failing.
# Uses scripts/ops/ops-guard-agent.mjs

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: read
  issues: write

concurrency:
  group: ops-prod-guard
  cancel-in-progress: true

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run ops guard agent
        id: guard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          OPS_BASE_URL: ${{ vars.OPS_BASE_URL || 'https://www.dominat8.com' }}
          OPS_DOMAINS: ${{ vars.OPS_DOMAINS || 'dominat8.com,www.dominat8.com' }}
        run: |
          node scripts/ops/ops-guard-agent.mjs 2>&1 | tee ops-guard.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Open issue on failure
        if: steps.guard.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="OPS GUARD: Prod health check failed — rollback attempted ($(date -u +'%Y-%m-%dT%H:%MZ'))"
          BODY="$(cat ops-guard.log)"
          gh issue create --title "$TITLE" --body "$BODY" \
            --label "production,incident" || true

      - name: Upload guard log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ops-guard-log-${{ github.run_id }}
          path: ops-guard.log
          if-no-files-found: ignore
