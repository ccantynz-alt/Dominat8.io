name: Ops Agent - Prod Guard

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ops-prod-guard
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run prod guard agent
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          OPS_BASE_URL: https://www.dominat8.com
          OPS_DOMAINS: dominat8.com,www.dominat8.com
        run: node scripts/ops/ops-guard-agent.mjs
