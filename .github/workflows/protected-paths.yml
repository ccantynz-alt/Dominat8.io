name: Protected Paths Guardrails

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect protected path changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            protected:
              - 'src/middleware.ts'
              - 'middleware.ts'
              - 'src/lib/engine/**'
              - 'src/app/api/stripe/**'
              - 'src/app/api/billing/**'

      - name: Enforce (block unless explicitly allowed)
        if: steps.filter.outputs.protected == 'true'
        run: |
          echo "Protected paths changed."
          echo "PR title: ${{ github.event.pull_request.title }}"
          echo "Branch:   ${{ github.head_ref }}"
          # Allow via PR title tag (hyphen or underscore)
          if echo "${{ github.event.pull_request.title }}" | grep -qE "\[ALLOW[-_]PROTECTED\]"; then
            echo "Bypass accepted via PR title tag."
            exit 0
          fi
          # Auto-allow claude/* and copilot/* branches (auto-approved via separate workflow)
          if echo "${{ github.head_ref }}" | grep -qE "^(claude|copilot)/"; then
            echo "Bypass accepted: AI agent branch (auto-approved)."
            exit 0
          fi
          echo ""
          echo "BLOCKED: This PR modifies protected paths."
          echo "To proceed, add [ALLOW-PROTECTED] to the PR title (explicit override)."
          echo "Example: [ALLOW-PROTECTED] fix: adjust middleware routing"
          exit 1

      - name: Pass (no protected changes)
        if: steps.filter.outputs.protected != 'true'
        run: echo "OK: no protected paths changed."