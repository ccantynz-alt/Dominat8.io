name: D8 Self-Healing CI

on:
  workflow_run:
    workflows: ["D8 CI - Build Gate"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: d8-selfheal-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  heal:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Guard — skip agent branches to prevent loops
        id: guard
        run: |
          BR="${{ github.event.workflow_run.head_branch }}"
          echo "branch=$BR"
          if echo "$BR" | grep -qE '^(agent/|claude/)'; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout failing branch
        if: steps.guard.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node 20
        if: steps.guard.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        if: steps.guard.outputs.skip == 'false'
        run: npm ci

      # ── Tier 1: Deterministic healer ─────────────────────────────────────────
      - name: Tier 1 — Run deterministic healer
        if: steps.guard.outputs.skip == 'false'
        id: t1_heal
        run: node scripts/heal.mjs

      - name: Tier 1 — Rebuild after deterministic fixes
        if: steps.guard.outputs.skip == 'false'
        id: t1_build
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log
          echo "passed=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ── Tier 2: Claude AI healer (fallback) ──────────────────────────────────
      - name: Tier 2 — Call Claude to generate patch
        if: steps.guard.outputs.skip == 'false' && steps.t1_build.outputs.passed != 'true'
        id: t2_claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY secret not set. Skipping AI tier."
            exit 0
          fi

          python3 - << 'PY'
import json, os, sys, urllib.request

log = open("build.log", "r", encoding="utf-8", errors="ignore").read()
# Trim to avoid oversized requests
if len(log) > 40000:
    log = log[-40000:]

prompt = f"""You are an automated code-fix agent for a Next.js 14 App Router project (Dominat8).

Your job: produce a minimal unified diff (git-apply compatible) that makes `npm run build` succeed.

RULES:
- Output ONLY a unified diff. No explanation, no markdown fences, no commentary.
- Do NOT make visible UI or design changes.
- Do NOT modify package.json or lock files.
- Prefer surgical fixes: types, imports, syntax, file routing conflicts.
- If a .tsx file contains PowerShell content, replace it with a proper re-export shim.
- Common re-export pattern for root app/ shims:
    export {{ default }} from "../../src/app/ROUTE/page";

BUILD LOG:
{log}
""".strip()

payload = {{
    "model": "claude-opus-4-5",
    "max_tokens": 4096,
    "messages": [
        {{"role": "user", "content": prompt}}
    ]
}}

req = urllib.request.Request(
    "https://api.anthropic.com/v1/messages",
    data=json.dumps(payload).encode("utf-8"),
    headers={{
        "Content-Type": "application/json",
        "x-api-key": os.environ["ANTHROPIC_API_KEY"],
        "anthropic-version": "2023-06-01"
    }},
    method="POST"
)

try:
    with urllib.request.urlopen(req, timeout=120) as resp:
        body = json.loads(resp.read().decode("utf-8"))
except urllib.error.HTTPError as e:
    err_body = e.read().decode()
    print(f"Anthropic API HTTP {e.code} error while calling /v1/messages: {err_body}")
    # Treat billing/quota errors as non-fatal — skip AI tier gracefully
    if e.code in (402, 429) or "insufficient" in err_body.lower() or "billing" in err_body.lower():
        print("Skipping AI tier due to billing/quota issue. Manual fix required.")
        sys.exit(0)
    sys.exit(1)
except urllib.error.URLError as e:
    print(f"Anthropic API network error while calling /v1/messages: {e.reason}")
    print("Skipping AI tier due to network issue.")
    sys.exit(0)

patch = ""
for block in body.get("content", []):
    if block.get("type") == "text":
        patch += block.get("text", "")

patch = patch.strip()

# Strip markdown fences if model wrapped the diff
if "```" in patch:
    lines = patch.split("\n")
    inside = False
    clean = []
    for line in lines:
        if line.startswith("```"):
            inside = not inside
            continue
        if inside:
            clean.append(line)
    patch = "\n".join(clean).strip()

if not patch or not (patch.startswith("diff --git ") or patch.startswith("--- ")):
    print("Claude did not return a valid unified diff.")
    print("Raw output:", patch[:500])
    sys.exit(2)

open("agent.patch", "w", encoding="utf-8").write(patch)
print("agent.patch written successfully.")
PY

      - name: Tier 2 — Apply Claude patch
        if: steps.guard.outputs.skip == 'false' && steps.t1_build.outputs.passed != 'true'
        id: t2_apply
        run: |
          if [ ! -f agent.patch ]; then
            echo "No patch to apply. Skipping."
            exit 0
          fi
          git apply --verbose agent.patch

      - name: Tier 2 — Rebuild after Claude patch
        if: steps.guard.outputs.skip == 'false' && steps.t1_build.outputs.passed != 'true'
        id: t2_build
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build_after.log
          echo "passed=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      # ── Commit & PR ───────────────────────────────────────────────────────────
      - name: Check if any changes were made
        if: steps.guard.outputs.skip == 'false'
        id: changes
        run: |
          if git diff --quiet HEAD; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create fix branch and PR
        if: |
          steps.guard.outputs.skip == 'false' &&
          steps.changes.outputs.has_changes == 'true' &&
          (steps.t1_build.outputs.passed == 'true' || steps.t2_build.outputs.passed == 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          BASE_BR="${{ github.event.workflow_run.head_branch }}"
          TS=$(date +%Y%m%d_%H%M%S)
          FIX_BR="claude/autofix_${TS}"

          git config user.name "d8-healer[bot]"
          git config user.email "d8-healer@users.noreply.github.com"
          git checkout -b "$FIX_BR"
          git add -A
          git commit -m "fix(ci): self-heal build failures [bot]"
          git push origin "$FIX_BR"

          # Determine which tier fixed it
          if [ "${{ steps.t1_build.outputs.passed }}" == "true" ]; then
            TIER="Tier 1 (deterministic)"
          else
            TIER="Tier 2 (Claude AI)"
          fi

          gh pr create \
            --title "fix(ci): self-heal build — ${BASE_BR} [$TIER]" \
            --body "$(cat <<EOF
## Self-Healing Build Fix

**Trigger branch:** \`${BASE_BR}\`
**Fix applied by:** ${TIER}
**Status:** Build passing after fix ✅

### What was fixed
$(git diff HEAD~1 --stat)

> Auto-generated by D8 Self-Healing CI. Review changes before merging.
EOF
)" \
            --base "$BASE_BR" \
            --head "$FIX_BR"

      - name: Report failure (no fix found)
        if: |
          steps.guard.outputs.skip == 'false' &&
          steps.t1_build.outputs.passed != 'true' &&
          steps.t2_build.outputs.passed != 'true'
        run: |
          echo "::error::Self-healing failed. Both Tier 1 (deterministic) and Tier 2 (Claude AI) could not fix the build."
          echo "Manual intervention required. Check build.log artifact."
          exit 1

      - name: Upload build logs
        if: always() && steps.guard.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: d8-heal-logs-${{ github.run_id }}
          path: |
            build.log
            build_after.log
            agent.patch
          if-no-files-found: ignore
